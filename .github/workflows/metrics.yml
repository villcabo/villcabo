name: Metrics

on:
  # Refresca el SVG cada día a las 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # Token personal (PAT) guardado como secreto del repo. Ver README de setup.
          token: ${{ secrets.METRICS_TOKEN }}
          user: villcabo
          filename: github-metrics.svg
          template: classic
          base: header, repositories, metadata
          config_timezone: America/La_Paz
          # Lenguajes más usados
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_sort: true
          # Logros (reemplaza los "trophies")
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
